<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Núcleo-Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modulos.css">


</head>
<style>

              @keyframes titleShine {
            0% {
                left: -100%;
            }
            50%, 100% {
                left: 100%;
            }
        }
        
        #titulo {
          position: relative;
          overflow: hidden;
          display: inline-block;
        }
        #titulo::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.1), transparent);
          animation: titleShine 3s infinite;
          z-index: 1;
          pointer-events: none;
        }
        #titulo {
          z-index: 2;
        }
</style>

<body>
    <div style="display: flex; align-items: center; justify-content: center; gap: 24px;">
        <h1 id="titulo"
            style="font-family:'Roboto Slab', 'Georgia', serif; font-size:2.8em; color:#184d27; letter-spacing:2px; font-weight:900; padding:10px 12px; margin:0;">
            PORTAL NÚCLEO TÉCNICO
        </h1>
    </div>
    <br>

  <div class="menu-container">
    <button id="btn-relatorios" class="menu-btn" onclick="location.href='relatorios-tecnicos.html'">Relatórios<br>Técnicos</button>
    <button id="btn-checklist" class="menu-btn" onclick="location.href='checklist.html'">Checklist</button>
    <button id="btn-indices" class="menu-btn" onclick="location.href='indices.html'">Índices</button>
    <button id="btn-seloprojeto" class="menu-btn" onclick="location.href='seloprojeto.html'">Selo Projeto</button>
    <button id="btn-fluxos" class="menu-btn" onclick="location.href='fluxos.html'">Fluxos</button>
    <button id="btn-calendario" class="menu-btn" onclick="location.href='calendario.html'">Calendário</button>
    <button id="btn-links" class="menu-btn" onclick="location.href='links.html'">Links</button>
    <button id="btn-modulos" class="menu-btn" onclick="location.href='modulos.html'">Módulos
      <br>Homologados</button>
    <button id="btn-ferramentas" class="menu-btn"
      onclick="location.href='ferramentas.html'">Ferramentas</button>
    <button id="btn-controlens" class="menu-btn" onclick="location.href='controlens.html'">Controle<br>Análises</button>
    <button id="btn-engenharia" class="menu-btn" onclick="location.href='engenharia.html'">Engenharia</button>
    <button id="btn-configuracoes" class="menu-btn" onclick="location.href='configuracoes.html'">Configurações</button>
    <button class="menu-btn" onclick="logout()" style="background: linear-gradient(145deg, #d32f2f, #f44336);">Sair</button>

  </div>

  <script src="auth.js"></script>
  <script src="menu.js"></script>

    <h1 style="display:inline-block; vertical-align:middle; padding: 0px 0px;">MÓDULOS BLINDADOS HOMOLOGADOS</h1>

    <div class="acoes-cadastro-modulos">
      <button id="toggleCadastroBtn" class="btn-primario" type="button">Mostrar Cadastro de arquivos em PDF</button>
    </div>


    <!-- Seções: Cadastro e Busca -->
    <div class="modulos-secoes">
      <div id="formularioCadastro" class="modulos-card" hidden>
        <h2>Cadastro de arquivos em PDF</h2>
        <form id="formProjeto" class="form-modulos">
          <div class="campo">
            <label for="nomeProjeto">Nome do Projeto</label>
            <input type="text" id="nomeProjeto" required>
          </div>
          <div class="campo">
            <label for="tipoSubestacao">Tipo de Subestacao</label>
            <select id="tipoSubestacao">
              <option value="">Selecione</option>
              <option value="N04">N°04</option>
              <option value="N08">N°08</option>
            </select>
          </div>
          <div class="campo">
            <label for="modeloProjeto">Modelo</label>
            <input type="text" id="modeloProjeto" placeholder="Digite o modelo">
          </div>
          <div class="campo">
            <label for="nivelTensao">Nivel de Tensao</label>
            <select id="nivelTensao">
              <option value="">Selecione</option>
              <option value="13.8kv">13.8 kv</option>
              <option value="22kv">22 kv</option>
              <option value="34.5kv">34.5 kv</option>
            </select>
          </div>
          <div class="campo">
            <label for="modalidadeProjeto">Modalidade</label>
            <select id="modalidadeProjeto">
              <option value="">Selecione</option>
              <option value="individual">Individual</option>
              <option value="compartilhada">Compartilhada</option>
            </select>
          </div>
          <div class="campo">
            <label for="aplicacaoProjeto">Aplicacao</label>
            <select id="aplicacaoProjeto">
              <option value="">Selecione</option>
              <option value="interno">Interno</option>
              <option value="externo">Externo</option>
            </select>
          </div>
          <div class="campo">
            <label for="versaoProjeto">Versao</label>
            <input type="text" id="versaoProjeto" placeholder="Digite a versao">
          </div>
          <div class="campo">
            <label for="arquivoPDF">Arquivo PDF</label>
            <input type="file" id="arquivoPDF" accept="application/pdf" required>
            <div id="dropzoneArquivoPDF" class="upload-dropzone" tabindex="0" role="button" aria-label="Arraste um PDF aqui ou clique para selecionar">
              Arraste o PDF aqui ou clique para selecionar
            </div>
            <p id="arquivoPDFSelecionado" class="upload-file-name">Nenhum arquivo selecionado.</p>
          </div>
          <div class="acoes-form">
            <button type="submit" class="btn-primario">Enviar</button>
          </div>
        </form>
      </div>

      <div class="modulos-card">
        <h2>Buscar Projeto</h2>
        <div class="busca-campos">
          <div class="campo">
            <label for="buscaProjeto">Nome do Projeto</label>
            <input type="text" id="buscaProjeto" placeholder="Digite o nome do projeto ou * para listar todos">
          </div>
          <div class="campo">
            <label for="buscaTipoSubestacao">Tipo de Subestacao</label>
            <select id="buscaTipoSubestacao">
              <option value="">Todos</option>
              <option value="N04">N°04</option>
              <option value="N08">N°08</option>
            </select>
          </div>
          <div class="campo">
            <label for="buscaModeloProjeto">Modelo</label>
            <input type="text" id="buscaModeloProjeto" placeholder="Modelo">
          </div>
          <div class="campo">
            <label for="buscaNivelTensao">Nivel de Tensao</label>
            <select id="buscaNivelTensao">
              <option value="">Todos</option>
              <option value="13.8kv">13.8 kv</option>
              <option value="22kv">22 kv</option>
              <option value="34.5kv">34.5 kv</option>
            </select>
          </div>
          <div class="campo">
            <label for="buscaModalidadeProjeto">Modalidade</label>
            <select id="buscaModalidadeProjeto">
              <option value="">Todas</option>
              <option value="individual">Individual</option>
              <option value="compartilhada">Compartilhada</option>
            </select>
          </div>
          <div class="campo">
            <label for="buscaAplicacaoProjeto">Aplicacao</label>
            <select id="buscaAplicacaoProjeto">
              <option value="">Todas</option>
              <option value="interno">Interno</option>
              <option value="externo">Externo</option>
            </select>
          </div>
          <div class="campo">
            <label for="buscaVersaoProjeto">Versao</label>
            <input type="text" id="buscaVersaoProjeto" placeholder="Versao">
          </div>
        </div>
        <div class="busca-modulos">
          <button id="btnBuscar" class="btn-primario">Buscar</button>
        </div>
        <p class="ajuda-busca">Use * para listar todos os projetos.</p>
      </div>
    </div>

  <!-- Área de resultados -->
  <div id="resultado"></div>

    <script type="module"src="modulos.js"></script>
</body>

</html>
