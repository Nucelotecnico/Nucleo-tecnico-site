<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">

  <style>
    @keyframes titleShine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    #titulo {
      position: relative;
      overflow: hidden;
      display: inline-block;
      z-index: 2;
    }

    #titulo::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.1), transparent);
      animation: titleShine 3s infinite;
      z-index: 1;
      pointer-events: none;
    }

/* Namespace exclusivo: nszip- */
    .nszip-body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 24px 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .nszip-container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 650px;
      margin: 0 auto;
    }

    .nszip-title {
      margin-bottom: 20px;
      color: #333;
    }

    .nszip-dropzone {
      width: 100%;
      height: 150px;
      border: 2px dashed #0078d7;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #0078d7;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
      background-color: #f9fbfd;
    }

    .nszip-dropzone.dragover {
      background-color: #e6f2ff;
      border-color: #005a9e;
      color: #005a9e;
    }

    .nszip-button {
      background: #0078d7;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 10px;
    }

    .nszip-button:hover {
      background: #005a9e;
    }

    .nszip-action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .nszip-file-list {
      text-align: left;
      margin-top: 10px;
      font-size: 14px;
      color: #444;
      max-height: 100px;
      overflow-y: auto;
    }

    .nszip-file-list li {
      margin: 5px 0;
    }

    .nszip-file-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 8px;
      border: 1px solid #e3eaf2;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 6px;
    }

    .nszip-file-list-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .nszip-file-remove-btn {
      background: transparent;
      color: #b42318;
      border: 1px solid #f5c2bd;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .nszip-file-remove-btn:hover {
      background: #fff4f3;
    }

    .nszip-select-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .nszip-secondary-button {
      background: #ffffff;
      color: #0078d7;
      border: 1px solid #0078d7;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nszip-secondary-button:hover {
      background: #eaf4ff;
      border-color: #005a9e;
      color: #005a9e;
    }

    .nszip-input-group {
      margin: 15px 0;
      text-align: left;
    }

    .nszip-input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #333;
    }

    .nszip-input-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .nszip-seal-config {
      margin: 18px 0;
      text-align: left;
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 12px;
      background: #f8fbff;
    }

    .nszip-seal-config legend {
      color: #123b64;
      font-weight: 600;
      padding: 0 6px;
    }

    .nszip-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
      align-items: end;
    }

    .nszip-config-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nszip-config-field input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      padding: 2px;
    }

    .nszip-config-field input[type="number"],
    .nszip-config-field input[type="text"],
    .nszip-config-field input[type="range"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
    }

    .nszip-config-field textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
      min-height: 150px;
      resize: vertical;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    .nszip-checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .nszip-opacity-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nszip-opacity-value {
      font-size: 13px;
      color: #555;
      min-width: 35px;
      text-align: right;
    }

    .nszip-optional-section {
      margin-top: 16px;
      text-align: left;
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 12px;
      background: #f8fbff;
    }

    .nszip-optional-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .nszip-optional-title {
      margin: 0;
      color: #123b64;
      font-size: 16px;
    }

    .nszip-optional-group {
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      background: #ffffff;
    }

    .nszip-optional-group-header {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .nszip-optional-group-header .nszip-config-field {
      flex: 1;
      min-width: 220px;
    }

    .nszip-optional-seal-flag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #123b64;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .nszip-sheet-preview {
      margin-top: 16px;
      text-align: left;
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 12px;
      background: #f8fbff;
    }

    .nszip-sheet-preview h3 {
      margin: 0 0 10px 0;
      color: #123b64;
      font-size: 16px;
    }

    .nszip-letter-preview {
      border: 1px solid #c9dfd0;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
    }

    .nszip-letter-preview-header {
      padding: 14px 18px;
      background: linear-gradient(180deg, #f2fbf4 0%, #e9f8ed 100%);
      border-bottom: 1px solid #c9dfd0;
      color: #00803a;
    }

    .nszip-letter-preview-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      text-align: center;
      letter-spacing: 0.2px;
    }

    .nszip-letter-preview-meta {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #0d5f2d;
    }

    .nszip-letter-preview-body {
      padding: 18px;
      font-size: 13.5px;
      line-height: 1.45;
      color: #222;
      text-align: justify;
      text-justify: inter-word;
      white-space: pre-wrap;
      min-height: 260px;
    }

    .nszip-letter-preview-paragraph {
      margin: 0 0 10px 0;
    }

    .nszip-letter-preview-empty {
      color: #6c7a72;
      font-style: italic;
      text-align: center;
      padding: 30px 10px;
    }

    @media (max-width: 720px) {
      .nszip-body {
        padding: 16px 0;
      }

      .nszip-container {
        width: calc(100% - 24px);
        padding: 20px;
      }

      .nszip-config-grid {
        grid-template-columns: 1fr;
      }
    }

    .nszip-container {
      width: min(980px, 96%);
      margin-bottom: 28px;
    }
  </style>
</head>

  <script>
// Namespace exclusivo: nszip-
    let nszipFilesProj = [];
    let nszipFilesCoord = [];
    let nszipOptionalGroups = [];
    let nszipOptionalCounter = 0;
    const nszipPreferencesKey = "nszip-user-preferences";
    let nszipLastLetterPreviewState = null;

    function nszipRenderFileList(fileList, targetArray) {
      fileList.innerHTML = "";
      targetArray.forEach((file, index) => {
        const li = document.createElement("li");
        li.className = "nszip-file-list-item";

        const nameSpan = document.createElement("span");
        nameSpan.className = "nszip-file-list-name";
        nameSpan.textContent = file.name;

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "nszip-file-remove-btn";
        removeBtn.textContent = "Remover";
        removeBtn.addEventListener("click", () => {
          targetArray.splice(index, 1);
          nszipRenderFileList(fileList, targetArray);
        });

        li.appendChild(nameSpan);
        li.appendChild(removeBtn);
        fileList.appendChild(li);
      });
    }

    function nszipGetFileSignature(file) {
      return `${file.name}__${file.size}__${file.lastModified}`;
    }

    function nszipAddPdfFiles(files, targetArray, fileList) {
      const existingSignatures = new Set(targetArray.map(nszipGetFileSignature));
      const newFiles = Array.from(files).filter(file => {
        const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
        if (!isPdf) {
          return false;
        }

        const signature = nszipGetFileSignature(file);
        if (existingSignatures.has(signature)) {
          return false;
        }

        existingSignatures.add(signature);
        return true;
      });

      targetArray.push(...newFiles);
      nszipRenderFileList(fileList, targetArray);
    }

    function nszipSetupDropzone(dropzoneId, fileListId, targetArray) {
      const dropzone = document.getElementById(dropzoneId);
      const fileList = document.getElementById(fileListId);

      nszipSetupDropzoneElements(dropzone, fileList, targetArray);
    }

    function nszipSetupDropzoneElements(dropzone, fileList, targetArray) {

      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });

      dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
      });

      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        nszipAddPdfFiles(e.dataTransfer.files, targetArray, fileList);
      });
    }

    function nszipSetupPickers(fileInputId, pickFilesBtnId, fileListId, targetArray) {
      const fileInput = document.getElementById(fileInputId);
      const pickFilesBtn = document.getElementById(pickFilesBtnId);
      const fileList = document.getElementById(fileListId);

      nszipSetupPickerElements(fileInput, pickFilesBtn, fileList, targetArray);
    }

    function nszipSetupPickerElements(fileInput, pickFilesBtn, fileList, targetArray) {

      pickFilesBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", (e) => {
        nszipAddPdfFiles(e.target.files, targetArray, fileList);
        fileInput.value = "";
      });
    }

    function nszipSanitizeTitle(value) {
      return String(value || "")
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .toUpperCase();
    }

    function nszipGetStoredPreferences() {
      try {
        const rawValue = localStorage.getItem(nszipPreferencesKey);
        return rawValue ? JSON.parse(rawValue) : {};
      } catch {
        return {};
      }
    }

    function nszipSavePreferences() {
      const preferenceIds = [
        "nszip-matricula",
        "nszip-approvalText",
        "nszip-cemigText",
        "nszip-approvalColor",
        "nszip-bandColor",
        "nszip-cemigColor",
        "nszip-sealAngle",
        "nszip-bandHeight",
        "nszip-approvalSize",
        "nszip-cemigSize",
        "nszip-bandOpacity",
        "nszip-approvalOpacity",
        "nszip-cemigOpacity",
        "nszip-enableSeal",
        "nszip-extraSheetText"
      ];

      const preferences = {};
      for (const id of preferenceIds) {
        const element = document.getElementById(id);
        if (!element) {
          continue;
        }

        preferences[id] = element.type === "checkbox" ? element.checked : element.value;
      }

      try {
        localStorage.setItem(nszipPreferencesKey, JSON.stringify(preferences));
      } catch {
        // Ignore storage failures and keep the app functional.
      }
    }

    function nszipHexToRgb(hexColor) {
      const hex = String(hexColor || "").replace("#", "");
      if (!/^[0-9a-fA-F]{6}$/.test(hex)) {
        return PDFLib.rgb(0, 0, 0);
      }

      const r = parseInt(hex.slice(0, 2), 16) / 255;
      const g = parseInt(hex.slice(2, 4), 16) / 255;
      const b = parseInt(hex.slice(4, 6), 16) / 255;
      return PDFLib.rgb(r, g, b);
    }

    function nszipBuildRepeatedTokens(text, font, fontSize, targetWidth, minGap = 10) {
      const safeText = (text || "CEMIG").trim() || "CEMIG";
      const tokenWidth = font.widthOfTextAtSize(safeText, fontSize);
      const gap = Math.max(4, minGap);

      if (tokenWidth <= 0) {
        return { text: safeText, count: 1, gap, tokenWidth, totalWidth: 0 };
      }

      const count = Math.max(1, Math.floor((targetWidth + gap) / (tokenWidth + gap)));
      const totalWidth = (count * tokenWidth) + ((count - 1) * gap);

      return { text: safeText, count, gap, tokenWidth, totalWidth };
    }

    function nszipFitFontSizeToWidth(text, font, startSize, maxWidth, minSize = 6) {
      let size = startSize;
      while (size > minSize && font.widthOfTextAtSize(text, size) > maxWidth) {
        size -= 0.5;
      }
      return Math.max(minSize, size);
    }

    function nszipDrawRepeatedCenteredLine({
      page,
      repeatData,
      font,
      size,
      color,
      opacity,
      centerX,
      centerY,
      dirX,
      dirY,
      rotation,
      textHeight
    }) {
      const startX = centerX - ((repeatData.totalWidth / 2) * dirX);
      const startY = centerY - ((repeatData.totalWidth / 2) * dirY) - (textHeight / 2);

      for (let i = 0; i < repeatData.count; i++) {
        const offset = i * (repeatData.tokenWidth + repeatData.gap);
        page.drawText(repeatData.text, {
          x: startX + (offset * dirX),
          y: startY + (offset * dirY),
          size,
          font,
          color,
          opacity,
          rotate: rotation
        });
      }
    }

    async function nszipApplySealToPdf(pdfDoc, sealConfig) {
      if (!sealConfig.enabled) {
        return;
      }

      const sealDate = sealConfig.currentDateTime?.date || "";
      const sealTime = sealConfig.currentDateTime?.time || "";
      const matriculaSegment = sealConfig.matricula ? ` POR:${sealConfig.matricula}` : "";
      const approvalSealText = `${sealConfig.approvalText}${matriculaSegment} NS:${sealConfig.nsNumber || ""} ${sealDate} ${sealTime}`
        .replace(/\s+/g, " ")
        .trim();

      const boldFont = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
      const regularFont = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
      const bandColor = nszipHexToRgb(sealConfig.bandColor);
      const approvalColor = nszipHexToRgb(sealConfig.approvalColor);
      const cemigColor = nszipHexToRgb(sealConfig.cemigColor);

      for (const page of pdfDoc.getPages()) {
        const { width, height } = page.getSize();
        const diagonalLength = Math.sqrt((width * width) + (height * height));
        const drawFromTopLeft = sealConfig.angle >= 0;
        const start = drawFromTopLeft ? { x: 0, y: height } : { x: 0, y: 0 };
        const end = drawFromTopLeft ? { x: width, y: 0 } : { x: width, y: height };
        const diagonalAngle = Math.atan2(end.y - start.y, end.x - start.x);
        const dirX = Math.cos(diagonalAngle);
        const dirY = Math.sin(diagonalAngle);
        const normalX = -dirY;
        const normalY = dirX;
        const requestedBandHeight = Math.min(Math.max(sealConfig.bandHeight, 20), Math.max(20, height * 0.75));
        const previewApprovalSize = Math.min(sealConfig.approvalSize, requestedBandHeight * 0.72);
        const previewCemigSize = Math.min(sealConfig.cemigSize, requestedBandHeight * 0.36);
        const previewGap = Math.max(6, requestedBandHeight * 0.1);
        const previewApprovalHeight = boldFont.heightAtSize(previewApprovalSize);
        const previewCemigHeight = regularFont.heightAtSize(previewCemigSize);
        const previewNeededHeight = (previewCemigHeight * 2) + previewApprovalHeight + (previewGap * 2);
        const targetBandHeight = previewNeededHeight + Math.max(12, requestedBandHeight * 0.2);
        const bandHeight = Math.min(Math.max(requestedBandHeight, targetBandHeight), Math.max(30, height * 0.75));

        page.drawLine({
          start,
          end,
          thickness: bandHeight,
          color: bandColor,
          opacity: sealConfig.bandOpacity
        });

        const innerPaddingX = Math.max(18, bandHeight * 0.25);
        const innerWidth = Math.max(40, diagonalLength - (innerPaddingX * 2));
        const verticalPadding = Math.max(6, bandHeight * 0.1);

        const baseApprovalSize = Math.min(sealConfig.approvalSize, bandHeight * 0.72);
        const baseCemigSize = Math.min(sealConfig.cemigSize, bandHeight * 0.36);
        const baseGap = Math.max(6, bandHeight * 0.09);
        const approvalTokenGap = Math.max(8, bandHeight * 0.13);
        const cemigTokenGap = Math.max(8, bandHeight * 0.11);

        const baseApprovalHeight = boldFont.heightAtSize(baseApprovalSize);
        const baseCemigHeight = regularFont.heightAtSize(baseCemigSize);
        const availableHeight = Math.max(20, bandHeight - (verticalPadding * 2));
        const neededHeight = (baseCemigHeight * 2) + baseApprovalHeight + (baseGap * 2);
        const heightScale = neededHeight > availableHeight ? (availableHeight / neededHeight) : 1;

        let approvalFontSize = baseApprovalSize * heightScale;
        let cemigFontSize = baseCemigSize * heightScale;
        let lineGap = baseGap * heightScale;

        approvalFontSize = Math.max(8, approvalFontSize);
        cemigFontSize = Math.max(6, cemigFontSize);

        const previewApproval = approvalSealText || "APROVADO";
        const previewCemig = (sealConfig.cemigText || "CEMIG").trim() || "CEMIG";
        approvalFontSize = nszipFitFontSizeToWidth(previewApproval, boldFont, approvalFontSize, innerWidth);
        cemigFontSize = nszipFitFontSizeToWidth(previewCemig, regularFont, cemigFontSize, innerWidth);

        const approvalRepeat = nszipBuildRepeatedTokens(approvalSealText, boldFont, approvalFontSize, innerWidth, approvalTokenGap);
        const cemigRepeat = nszipBuildRepeatedTokens(sealConfig.cemigText, regularFont, cemigFontSize, innerWidth, cemigTokenGap);

        const approvalHeight = boldFont.heightAtSize(approvalFontSize);
        const cemigHeight = regularFont.heightAtSize(cemigFontSize);
        const centerGap = ((approvalHeight + cemigHeight) / 2) + lineGap;
        const baseCenterX = (start.x + end.x) / 2;
        const baseCenterY = (start.y + end.y) / 2;
        const approvalOffset = 0;
        const cemigTopOffset = centerGap;
        const cemigBottomOffset = -centerGap;

        const approvalCenterX = baseCenterX + (normalX * approvalOffset);
        const approvalCenterY = baseCenterY + (normalY * approvalOffset);
        const cemigTopCenterX = baseCenterX + (normalX * cemigTopOffset);
        const cemigTopCenterY = baseCenterY + (normalY * cemigTopOffset);
        const cemigBottomCenterX = baseCenterX + (normalX * cemigBottomOffset);
        const cemigBottomCenterY = baseCenterY + (normalY * cemigBottomOffset);

        const rotation = PDFLib.degrees(diagonalAngle * (180 / Math.PI));

        nszipDrawRepeatedCenteredLine({
          page,
          repeatData: approvalRepeat,
          font: boldFont,
          size: approvalFontSize,
          color: approvalColor,
          opacity: sealConfig.approvalOpacity,
          centerX: approvalCenterX,
          centerY: approvalCenterY,
          dirX,
          dirY,
          rotation,
          textHeight: approvalHeight
        });

        nszipDrawRepeatedCenteredLine({
          page,
          repeatData: cemigRepeat,
          font: regularFont,
          size: cemigFontSize,
          color: cemigColor,
          opacity: sealConfig.cemigOpacity,
          centerX: cemigTopCenterX,
          centerY: cemigTopCenterY,
          dirX,
          dirY,
          rotation,
          textHeight: cemigHeight
        });

        nszipDrawRepeatedCenteredLine({
          page,
          repeatData: cemigRepeat,
          font: regularFont,
          size: cemigFontSize,
          color: cemigColor,
          opacity: sealConfig.cemigOpacity,
          centerX: cemigBottomCenterX,
          centerY: cemigBottomCenterY,
          dirX,
          dirY,
          rotation,
          textHeight: cemigHeight
        });
      }
    }

    function nszipBuildExtraSheetText(nsNumber, currentDate, currentTime, rawText) {
      const defaultText = 

`"Antes de solicitar a ligação, esta instalação deve ser submetida a uma vistoria pela CEMIG."
- Esta análise não isenta o responsável técnico da obra quanto à observância das normas CEMIG, ABNT e AMBIENTAIS.

- A ligação ao sistema elétrico da CEMIG está condicionada à análise de viabilidade técnica e comercial, podendo haver custos ao interessado.`;
      const sourceText = String(rawText || defaultText).trim() || defaultText;
      const normalizedText = sourceText
        .replace(/\bNumero da NS\b/g, nsNumber)
        .replace(/\bdata\b/g, currentDate)
        .replace(/\bhora\b/g, currentTime);

        size: metaSize,
        font: fontBold,
        color: greenColor
      });

      page.drawLine({
        start: { x: 70, y: 760 },
        end: { x: 525, y: 760 },
        thickness: 1.2,
        color: greenColor,
        opacity: 0.9
      });

      cursorY -= 82;

      const paragraphs = content.split(/\r?\n\s*\n/).map(block => block.trim()).filter(Boolean);

      const drawJustifiedLine = (line, y, justifyWidth, isLastLine) => {
        const safeLine = line.trim();
        if (!safeLine) {
          return;
        }

        const words = safeLine.split(/\s+/);
        const lineWidth = font.widthOfTextAtSize(safeLine, 11.5);
        const needsJustify = !isLastLine && words.length > 1;
        const wordSpacing = needsJustify ? Math.max(0, (justifyWidth - lineWidth) / (words.length - 1)) : 0;

        page.drawText(safeLine, {
          x: marginX,
          y,
          size: 11.5,
          font,
          color: PDFLib.rgb(0, 0, 0),
          wordSpacing
        });
      };

      for (const paragraph of paragraphs) {
        const safeParagraph = paragraph.trim();
        if (!safeParagraph) {
          cursorY -= 8;
          continue;
        }

        const words = safeParagraph.split(/\s+/);
        let currentLine = "";
        const lines = [];

        const flushLine = (line) => {
          if (!line) {
            return;
          }
          lines.push(line);
        };

        for (const word of words) {
          const testLine = currentLine ? `${currentLine} ${word}` : word;
          if (font.widthOfTextAtSize(testLine, 11.5) > contentWidth) {
            flushLine(currentLine);
            currentLine = word;
          } else {
            currentLine = testLine;
          }
        }

        flushLine(currentLine);

        lines.forEach((line, index) => {
          drawJustifiedLine(line, cursorY, contentWidth, index === lines.length - 1);
          cursorY -= lineHeight;
        });

        cursorY -= 4;
      }

      await nszipApplySealToPdf(pdfDoc, sealConfig);
      return await pdfDoc.save();
    }

    async function nszipMergePDFs(files, sealConfig) {
      const mergedPdf = await PDFLib.PDFDocument.create();
      for (const file of files) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
        const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        copiedPages.forEach(page => mergedPdf.addPage(page));
      }

      await nszipApplySealToPdf(mergedPdf, sealConfig);
      return await mergedPdf.save();
    }

    document.getElementById("nszip-createZipBtn").addEventListener("click", async () => {
      const nsNumber = document.getElementById("nszip-nsNumber").value.trim();
      if (!nsNumber) {
        alert("Digite o número da NS!");
        return;
      }

      const currentDate = nszipGetCurrentDateFormatted();
      const currentDateTime = nszipRenderExtraSheetPreview()?.currentDateTime || nszipGetCurrentDateTimeFormatted();

      const projName = `${nsNumber}_PROJ_APVD_${currentDate}.pdf`;
      const coordName = `${nsNumber}_COORD_APVD_${currentDate}.pdf`;
      const zipName = `${nsNumber}_APROVACAO_${currentDate}.zip`;
      const sealConfig = nszipGetSealConfig();
      sealConfig.nsNumber = nsNumber;
      sealConfig.currentDateTime = currentDateTime;
      const optionalGroupsWithFiles = nszipOptionalGroups.filter(group => group.files.length > 0);

      if (nszipFilesProj.length === 0 && nszipFilesCoord.length === 0 && optionalGroupsWithFiles.length === 0) {
        alert("Adicione arquivos em pelo menos um dos campos (arrastar ou selecionar)!");
        return;
      }

      for (const group of optionalGroupsWithFiles) {
        const rawTitle = group.titleInput.value;
        const sanitized = nszipSanitizeTitle(rawTitle);
        if (!sanitized) {
          alert(`Preencha o titulo do arquivo opcional ${group.id} para continuar.`);
          return;
        }
      }

      const zip = new JSZip();

      if (nszipFilesProj.length > 0) {
        const projSealConfig = nszipBuildSectionSealConfig(sealConfig, sealConfig.projEnabled);
        const projPdfBytes = await nszipMergePDFs(nszipFilesProj, projSealConfig);
        zip.file(projName, projPdfBytes);
      }

      if (nszipFilesCoord.length > 0) {
        const coordSealConfig = nszipBuildSectionSealConfig(sealConfig, sealConfig.coordEnabled);
        const coordPdfBytes = await nszipMergePDFs(nszipFilesCoord, coordSealConfig);
        zip.file(coordName, coordPdfBytes);
      }

      const extraSheetPdfBytes = await nszipCreateExtraSheetPdf(nsNumber, currentDateTime.date, currentDateTime.time, sealConfig);
      zip.file(`${nsNumber}_CARTA_APROVACAO_${currentDate}.pdf`, extraSheetPdfBytes);

      for (let i = 0; i < optionalGroupsWithFiles.length; i++) {
        const group = optionalGroupsWithFiles[i];
        const customTitle = nszipSanitizeTitle(group.titleInput.value);
        const optionalName = `${nsNumber}_${customTitle}_APVD_${currentDate}.pdf`;
        const optionalSealConfig = {
          ...sealConfig,
          enabled: sealConfig.enabled && group.applySealInput.checked
        };
        const optionalPdfBytes = await nszipMergePDFs(group.files, optionalSealConfig);
        zip.file(optionalName, optionalPdfBytes);
      }

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);

      const a = document.createElement("a");
      a.href = url;
      a.download = zipName;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
