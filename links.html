<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Núcleo-Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="links.css">
   <script src="https://unpkg.com/@supabase/supabase-js"></script>
</head>
<style>

              @keyframes titleShine {
            0% {
                left: -100%;
            }
            50%, 100% {
                left: 100%;
            }
        }
        
        #titulo {
          position: relative;
          overflow: hidden;
          display: inline-block;
        }
        #titulo::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.1), transparent);
          animation: titleShine 3s infinite;
          z-index: 1;
          pointer-events: none;
        }
        #titulo {
          z-index: 2;
        }
</style>
<body>
    <div style="display: flex; align-items: center; justify-content: center; gap: 24px;">
        <h1 id="titulo"
            style="font-family:'Roboto Slab', 'Georgia', serif; font-size:2.8em; color:#184d27; letter-spacing:2px; font-weight:900; padding:10px 12px; margin:0;">
            PORTAL NÚCLEO TÉCNICO
        </h1>
    </div>
    <br>

  <div class="menu-container">
    <button id="btn-relatorios" class="menu-btn" onclick="location.href='relatorios-tecnicos.html'">Relatórios<br>Técnicos</button>
    <button id="btn-checklist" class="menu-btn" onclick="location.href='checklist.html'">Checklist</button>
    <button id="btn-indices" class="menu-btn" onclick="location.href='indices.html'">Índices</button>
    <button id="btn-fluxos" class="menu-btn" onclick="location.href='fluxos.html'">Fluxos</button>
    <button id="btn-calendario" class="menu-btn" onclick="location.href='calendario.html'">Calendário</button>
    <button id="btn-links" class="menu-btn" onclick="location.href='links.html'">Links</button>
    <button id="btn-modulos" class="menu-btn" onclick="location.href='modulos.html'">Módulos
      <br>Homologados</button>
    <button id="btn-ferramentas" class="menu-btn"
      onclick="location.href='ferramentas.html'">Ferramentas</button>
    <button id="btn-controlens" class="menu-btn" onclick="location.href='controlens.html'">Controle<br>Análises</button>
    <button id="btn-engenharia" class="menu-btn" onclick="location.href='engenharia.html'">Engenharia</button>
    <button id="btn-configuracoes" class="menu-btn" onclick="location.href='configuracoes.html'">Configurações</button>
    <button class="menu-btn" onclick="logout()" style="background: linear-gradient(145deg, #d32f2f, #f44336);">Sair</button>

  </div>

  <script src="auth.js"></script>
  <script src="menu.js"></script>



    <h1 style="display:inline-block; vertical-align:middle; padding: 0px 0px;">LINK DE ACESSO RÁPIDO</h1>

    <div class="links-container">
        <div id="form-adicionar-link" class="links-card">
            <h2>📌 Adicionar Novo Link</h2>
            <div class="form-links">
                <div class="campo">
                    <label for="title">Título do Link</label>
                    <input type="text" id="title" placeholder="Ex: Portal AGV" />
                </div>
                <div class="campo">
                    <label for="url">URL</label>
                    <input type="text" id="url" placeholder="Ex: https://exemplo.com" />
                </div>
                <div class="acoes-form">
                    <button onclick="addLink()" class="btn-primario">Adicionar Link</button>
                </div>
            </div>
        </div>

        <div id="linkTableContainer" class="links-card">
            <h2>📋 Links Cadastrados</h2>
            <div class="tabela-wrapper">
                <table class="tabela-links">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>URL</th>
                            <th id="th-acoes">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="linkTable"></tbody>
                </table>
            </div>
        </div>
    </div>


    <script src="links.js"></script>

</body>

</html>
