<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Núcleo-Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">



    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="calendario.css">

</head>

<body>

  <!-- Barra de Carregamento Circular -->
  <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);">
      <svg width="120" height="120" viewBox="0 0 120 120" style="margin: 0 auto 20px;">
        <!-- Círculo de fundo -->
        <circle cx="60" cy="60" r="55" fill="none" stroke="#e0e0e0" stroke-width="6"></circle>
        <!-- Círculo de progresso -->
        <circle id="progressCircle" cx="60" cy="60" r="55" fill="none" stroke="#2e7d32" stroke-width="6" stroke-dasharray="345.575" stroke-dashoffset="345.575" stroke-linecap="round" transform="rotate(-90 60 60)" style="transition: stroke-dashoffset 0.3s ease;"></circle>
        <!-- Percentual -->
        <text id="loadingPercent" x="60" y="65" font-size="24" font-weight="bold" text-anchor="middle" fill="#2e7d32">0%</text>
      </svg>
      <p id="loadingText" style="margin-top: 16px; color: #666; font-size: 16px; font-weight: 500;">Carregando dados...</p>
    </div>
  </div>

    <div style="display: flex; align-items: center; justify-content: center; gap: 24px;">
        <h1 id="titulo"
            style="font-family:'Roboto Slab', 'Georgia', serif; font-size:2.8em; color:#184d27; letter-spacing:2px; font-weight:900; padding:10px 12px; margin:0;">
            PORTAL NÚCLEO TÉCNICO
        </h1>
    </div>
    <br>

  <div class="menu-container">
    <button id="btn-relatorios" class="menu-btn" onclick="location.href='relatorios-tecnicos.html'">Relatórios<br>Técnicos</button>
    <button id="btn-checklist" class="menu-btn" onclick="location.href='checklist.html'">Checklist</button>
    <button id="btn-indices" class="menu-btn" onclick="location.href='indices.html'">Índices</button>
    <button id="btn-fluxos" class="menu-btn" onclick="location.href='fluxos.html'">Fluxos</button>
    <button id="btn-calendario" class="menu-btn" onclick="location.href='calendario.html'">Calendário</button>
    <button id="btn-links" class="menu-btn" onclick="location.href='links.html'">Links</button>
    <button id="btn-modulos" class="menu-btn" onclick="location.href='modulos.html'">Módulos
      <br>Homologados</button>
    <button id="btn-ferramentas" class="menu-btn"
      onclick="location.href='ferramentas.html'">Ferramentas</button>
    <button id="btn-controlens" class="menu-btn" onclick="location.href='controlens.html'">Controle<br>Análises</button>
    <button id="btn-engenharia" class="menu-btn" onclick="location.href='engenharia.html'">Engenharia</button>
    <button id="btn-configuracoes" class="menu-btn" onclick="location.href='configuracoes.html'">Configurações</button>
    <button class="menu-btn" onclick="logout()" style="background: linear-gradient(145deg, #d32f2f, #f44336);">Sair</button>

  </div>

    <!-- Alerta de aniversário: aparece abaixo dos botões do header -->
    <style>
        @keyframes slideInOutAlert {
            0% {
                opacity: 0;
                transform: translateX(-100vw);
            }
            15% {
                opacity: 1;
                transform: translateX(0);
            }
            85% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(100vw);
            }
        }
        #alerta-aniversario {
            display: none;
            background: linear-gradient(90deg, #a8ff78 0%, #78ffd6 100%);
            color: #14532d;
            font-weight: bold;
            text-align: center;
            padding: 20px 0 20px 0;
            font-size: 1.3em;
            margin: 20px auto 20px auto;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(20, 83, 45, 0.18);
            border: 2.5px solid #2ecc40;
            max-width: 650px;
            letter-spacing: 0.7px;
            transition: box-shadow 0.3s;
            z-index: 1000;
            position: relative;
        }
        #alerta-aniversario.animar-alerta {
            display: block !important;
            animation: slideInOutAlert 5s cubic-bezier(.77,0,.18,1) forwards;
        }

    

              @keyframes titleShine {
            0% {
                left: -100%;
            }
            50%, 100% {
                left: 100%;
            }
        }
        
        #titulo {
          position: relative;
          overflow: hidden;
          display: inline-block;
        }
        #titulo::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.1), transparent);
          animation: titleShine 3s infinite;
          z-index: 1;
          pointer-events: none;
        }
        #titulo {
          z-index: 2;
        }

    </style>
    <div id="alerta-aniversario"></div>

  <script src="auth.js"></script>
  <script src="menu.js"></script>


    <h1 style="display:inline-block; vertical-align:middle; padding: 0px 0px;">CALENDÁRIO</h1>

    <div id="containergeral">
        <!-- Painel Esquerdo: Gerenciar Usuários -->
        <aside id="user-container">
            <button id="toggle-users-btn" class="panel-toggle-btn">👥 Gerenciar Usuários</button>
            <div id="user-manager" style="display:none;">
                <h3>👥 Gerenciar Usuários</h3>
                <form id="user-form">
                    <div class="form-group">
                        <label for="user-name">📝 Nome:</label>
                        <input type="text" id="user-name" required placeholder="Nome do usuário">
                    </div>

                    <div class="form-group">
                        <label for="user-color">🎨 Cor:</label>
                        <input type="color" id="user-color" value="#ff0000" required>
                    </div>

                    <button type="submit" id="btn-cadastrar-usuario" class="btn-primary">✓ Cadastrar Usuário</button>
                </form>

                <ul id="user-list"></ul>
            </div>
        </aside>

        <!-- Calendário Central -->
        <main id="calendar"></main>

        <!-- Painel Direito: Adicionar Evento -->
        <aside id="form-container">
            <h3>📅 Adicionar Evento</h3>
            <form id="event-form">
                <div class="form-group">
                    <label for="title">📝 Título:</label>
                    <input type="text" id="title" required placeholder="Título do evento">
                </div>

                <div class="form-group">
                    <label for="type">🏷️ Tipo:</label>
                    <select id="type" required>
                        <option value="Compensação">Compensação</option>
                        <option value="Férias">Férias</option>
                        <option value="Serviço Externo">Serviço Externo</option>
                        <option value="Feriado">Feriado</option>
                        <option value="Licença Médica">Licença Médica</option>
                        <option value="Aniversário">Aniversário</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="user">👤 Usuário:</label>
                    <select id="user" required></select>
                </div>

                <div class="form-group">
                    <label for="start">📅 Data de Início:</label>
                    <input type="date" id="start" required>
                </div>

                <div class="form-group">
                    <label for="end">📅 Data de Fim:</label>
                    <input type="date" id="end" required>
                </div>

                <button type="submit" id="btn-adicionar-evento" class="btn-primary">✓ Adicionar Evento</button>
            </form>
        </aside>
    </div>

    <div id="future-events-report">
        <h3>📅 Eventos Futuros</h3>
        <ul id="future-events-list"></ul>
    </div>

















    <script src="calendario.js"></script>









</body>

</html>
