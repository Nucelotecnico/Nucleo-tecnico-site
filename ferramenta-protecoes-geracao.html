      left: -100%;
      width: 100%;

      animation: titleShine 3s infinite;
      z-index: 1;
      pointer-events: none;

  <div id="protecoesdegeracao" style="display:block; width:100%;">
    <div class="ferramentas-card">
      <h1 class="ferramentas-title">Proteções por tipo de Subestações</h1>
      <form id="formulario">
        <label>Tipo de Subestação</label>
        <div class="radio-grid" style="display:flex; flex-direction:column; gap:8px; align-items:flex-start;">
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="1" style="margin:0;">Subestação N 1</label>
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="2" style="margin:0;">Subestação N 2</label>
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="4" style="margin:0;">Subestação N 4</label>
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="5" style="margin:0;">Subestação N 5</label>
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="6" style="margin:0;">Subestação N 6</label>
          <label style="display:flex; align-items:center; gap:8px; white-space:nowrap;"><input type="radio" name="subestacao" value="8" style="margin:0;">Subestação N 8</label>
        </div>

        <label>Modalidade de conexão do Gerador</label>
        <div class="radio-group" style="display:flex; justify-content:center; align-items:center; gap:18px; flex-wrap:wrap;">
          <label><input type="radio" name="paralelismo" value="momentaneo"> Momentâneo (Diesel)</label>
          <label><input type="radio" name="paralelismo" value="permanente"> Permanente</label>
          <label><input type="radio" name="paralelismo" value="emergencial"> Emergência</label>
          <label><input type="radio" name="paralelismo" value="nenhum"> Nenhum</label>
        </div>

        <div id="camposExtras">
          <label>Modalidade de Injeção na Rede</label>
          <div class="radio-group">
            <label><input type="radio" name="injecao" value="com"> Com Injeção</label>
            <label><input type="radio" name="injecao" value="sem"> Sem Injeção</label>
          </div>

          <label>Modalidade de conexão da Usina</label>
          <div class="radio-group">
            <label><input type="radio" name="inversor" value="com"> Com Inversor</label>
            <label><input type="radio" name="inversor" value="sem"> Sem Inversor</label>
          </div>

          <label>Faixa de Potência da GD</label>
          <div class="radio-group">
            <label><input type="radio" name="faixa_gd" value="ate_75"> Até 75 kW</label>
            <label><input type="radio" name="faixa_gd" value="75_300"> 75 kW até 300 kW</label>
            <label><input type="radio" name="faixa_gd" value="300_2500"> 300 kW até 2500 kW</label>
          </div>

          <label>Período do Parecer de Acesso</label>
          <div class="radio-group">
            <label><input type="radio" name="parecer" value="antes"> Antes 15/01/2024</label>
            <label><input type="radio" name="parecer" value="apos"> Após 15/01/2024</label>
          </div>
        </div>

        <button type="submit">Enviar</button>
      </form>

      <div class="resultado" id="resultado-protecoesdegeracao"></div>
    </div>
  </div>
