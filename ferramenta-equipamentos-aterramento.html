<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipamentos de Aterramento - Portal Núcleo Técnico</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ferramentas.css">
  <style>
    @keyframes titleShine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    #titulo {
      position: relative;
      overflow: hidden;
      display: inline-block;
      z-index: 2;
    }

    #titulo::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(46, 125, 50, 0.1), transparent);
      animation: titleShine 3s infinite;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>

<body data-active-tool="equipamentosaterramento">
  <div style="display: flex; align-items: center; justify-content: center; gap: 24px;">
    <h1 id="titulo" style="font-family:'Roboto Slab', 'Georgia', serif; font-size:2.8em; color:#184d27; letter-spacing:2px; font-weight:900; padding:10px 12px; margin:0;">PORTAL NÚCLEO TÉCNICO</h1>
  </div>
  <br>

  <div class="menu-container">
    <button id="btn-relatorios" class="menu-btn" onclick="location.href='relatorios-tecnicos.html'">Relatórios<br>Técnicos</button>
    <button id="btn-checklist" class="menu-btn" onclick="location.href='checklist.html'">Checklist</button>
    <button id="btn-indices" class="menu-btn" onclick="location.href='indices.html'">Índices</button>
    <button id="btn-seloprojeto" class="menu-btn" onclick="location.href='seloprojeto.html'">Selo Projeto</button>
    <button id="btn-fluxos" class="menu-btn" onclick="location.href='fluxos.html'">Fluxos</button>
    <button id="btn-calendario" class="menu-btn" onclick="location.href='calendario.html'">Calendário</button>
    <button id="btn-links" class="menu-btn" onclick="location.href='links.html'">Links</button>
    <button id="btn-modulos" class="menu-btn" onclick="location.href='modulos.html'">Módulos<br>Homologados</button>
    <button id="btn-ferramentas" class="menu-btn" onclick="location.href='ferramentas.html'">Ferramentas</button>
    <button id="btn-controlens" class="menu-btn" onclick="location.href='controlens.html'">Controle<br>Análises</button>
    <button id="btn-engenharia" class="menu-btn" onclick="location.href='engenharia.html'">Engenharia</button>
    <button id="btn-configuracoes" class="menu-btn" onclick="location.href='configuracoes.html'">Configurações</button>
    <button class="menu-btn" onclick="logout()" style="background: linear-gradient(145deg, #d32f2f, #f44336);">Sair</button>
  </div>

  <div class="ferramentas-nav-shell">
    <h2 class="ferramentas-nav-title">Ferramentas</h2>
    <p class="ferramentas-nav-description">Navegue entre as ferramentas sem sair da área de Ferramentas.</p>
    <div class="ferramentas-nav">
      <a class="ferramenta-link-btn" href="ferramentas.html">Visão Geral</a>
      <a class="ferramenta-link-btn" href="ferramenta-conversor-coordenadas.html">Conversor de Coordenadas</a>
      <a class="ferramenta-link-btn" href="ferramenta-pesquisar-rts.html">Pesquisar RTs</a>
      <a class="ferramenta-link-btn active" href="ferramenta-equipamentos-aterramento.html">Equipamentos de Aterramento</a>
      <a class="ferramenta-link-btn" href="ferramenta-protecoes-geracao.html">Proteções de Geração</a>
      <a class="ferramenta-link-btn" href="ferramenta-gerenciador-reprovacoes.html">Gerenciador de Reprovações</a>
      <a class="ferramenta-link-btn" href="ferramenta-pdfzip.html">Unir PDFs e Criar ZIP</a>
    </div>
  </div>

  <div id="equipamentosaterramento" style="display:block; width:100%;">
    <div class="container2 ferramentas-card">
      <h1>Equipamento de Aterramento</h1>
      <label for="tipo">Tipo de Aterramento:</label>
      <select id="tipo">
        <option value="reator">Reator de aterramento</option>
        <option value="zigzag">Transformador zig-zag</option>
        <option value="estrela">Transformador estrela-aterrado</option>
      </select>

      <label for="potencia">Potência de geração (kVA):</label>
      <select id="potencia">
        <option value="">-- Selecione (kVA) --</option>
        <option value="500">até 500 kVA</option>
        <option value="1000">maior que 500 kVA até 1000 kVA</option>
        <option value="2000">maior que 1000 kVA até 2000 kVA</option>
        <option value="3000">maior que 2000 kVA até 3000 kVA</option>
        <option value="4000">maior que 3000 kVA até 4000 kVA</option>
        <option value="5000">maior que 4000 kVA até 5000 kVA</option>
      </select>

      <label for="tensao">Nível de tensão:</label>
      <select id="tensao">
        <option value="13.8">13,8 kV</option>
        <option value="22">22 kV</option>
        <option value="34.5">34,5 kV</option>
      </select>

      <button id="botao2" onclick="calcular()">Calcular</button>
      <div class="result2" id="resultado2"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="menu.js"></script>
  <script src="ferramentas.js"></script>
</body>

</html>
